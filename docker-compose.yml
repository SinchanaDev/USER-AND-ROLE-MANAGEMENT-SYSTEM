version: '3.8'
services:
  db:
    image: postgres:15
    container_name: usermgmt-db
    environment:
      POSTGRES_DB: usermgmt
      POSTGRES_USER: usermgmt_user
      POSTGRES_PASSWORD: usermgmt_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usermgmt_user -d usermgmt"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: usermgmt-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/usermgmt
      SPRING_DATASOURCE_USERNAME: usermgmt_user
      SPRING_DATASOURCE_PASSWORD: usermgmt_pass
      APP_JWT_SECRET: YourSuperSecretKeyForProductionReplaceThis12345678
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: usermgmt-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata: